name: CICD pipeline1


on:

  push:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
        jav-version: '17'
        distribution: 'temurin'
        cache: Maven
      - name: Build with maven
        run: mvn compile
