permissions:
  id-token: write
  contents: read

- name: Configure AWS Credentials (Account B)
  uses: aws-actions/configure-aws-credentials@v4
  with:
    role-to-assume: arn:aws:iam::<ACCOUNT_B_ID>:role/GitHubActionsRole
    aws-region: ap-south-1
    jobs:

  terraform-dev:
    name: Deploy to DEV (Account A)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS (DEV)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - run: terraform init
    - run: terraform apply -auto-approve


  terraform-prod:
    name: Deploy to PROD (Account B)
    runs-on: ubuntu-latest
    needs: terraform-dev

    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS (PROD)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::<ACCOUNT_B_ID>:role/GitHubActionsRole
        aws-region: ap-south-1

    - run: terraform init
    - run: terraform apply -auto-approve
